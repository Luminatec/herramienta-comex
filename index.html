<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Herramienta COMEX — Luminatec</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3/lib/msal-browser.min.js"></script>
<style>
:root{--navy:#14453f;--teal:#2c7a70;--teal2:#3a9b8e;--cream:#fff3d6;--ink:#1f2d2b;--grey:#eceff1;--green:#d6e9d5;--amber:#fbe2b3;--red:#f6c9ce;--blue:#1f4e79;}
*{box-sizing:border-box}
.tlbar{position:relative;height:40px;background:#eef2f1;border:1px solid #dfe6e4;border-radius:6px;margin:10px 0}
.tlmark{position:absolute;top:9px;width:11px;height:11px;border-radius:50%;transform:translateX(-50%);box-shadow:0 0 0 2px #fff;cursor:default}
.tlgrid{position:absolute;top:0;bottom:0;border-left:1px dashed #cbd6d3}
.tlgrid span{position:absolute;top:24px;left:2px;font-size:10px;color:#8a9a97}
.tlnow{position:absolute;left:0;top:0;bottom:0;border-left:2px solid #14453f}
.tlrow{font-size:13px;padding:2px 0;border-bottom:1px solid #f0f3f2}
.tldot{display:inline-block;width:9px;height:9px;border-radius:50%;vertical-align:middle;margin-right:5px}
.tllist{margin-top:8px;max-height:190px;overflow:auto}
body{font-family:Arial,Helvetica,sans-serif;margin:0;color:var(--ink);background:#f4f6f6;font-size:14px}
header{background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header h1{font-size:18px;margin:0}
header .actions button{margin-left:6px}
nav{background:var(--teal);display:flex;flex-wrap:wrap}
nav button{background:transparent;border:0;color:#fff;padding:12px 18px;cursor:pointer;font-size:14px;font-weight:bold;opacity:.8}
nav button.active{background:#fff;color:var(--teal);opacity:1}
main{padding:18px;max-width:1200px;margin:0 auto}
.tab{display:none}.tab.active{display:block}
h2{color:var(--navy);border-bottom:2px solid var(--teal);padding-bottom:6px}
h3{color:var(--teal);margin-bottom:6px}
table{border-collapse:collapse;width:100%;background:#fff;margin:8px 0}
th,td{border:1px solid #cfd8d8;padding:6px 8px;text-align:left}
th{background:var(--teal);color:#fff;font-size:12px}
input,select{font-family:inherit;font-size:13px;padding:5px;border:1px solid #b9c6c4;border-radius:4px;width:100%}
input.in{background:var(--cream);color:var(--blue);font-weight:bold}
td input{border:0;background:transparent;padding:4px}
td input.in{background:var(--cream)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
.card{background:#fff;border:1px solid #dbe3e2;border-radius:8px;padding:14px;margin-bottom:14px}
.res{display:flex;justify-content:space-between;padding:5px 8px;border-bottom:1px solid #eee}
.res b{color:var(--navy)}
.res.k{background:var(--amber);font-weight:bold;border-radius:4px}
.res.g{background:var(--green);font-weight:bold;border-radius:4px}
.res.mut{color:#888;font-size:13px}
.field{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:5px 0}
.field label{flex:1;font-size:13px}
.field input,.field select{flex:0 0 130px}
button{background:var(--teal);color:#fff;border:0;padding:8px 12px;border-radius:5px;cursor:pointer;font-size:13px}
button.sec{background:#7b8f8c}
button.mini{padding:3px 8px;font-size:12px}
.pill{padding:2px 8px;border-radius:10px;font-size:12px;font-weight:bold;display:inline-block}
.muted{color:#777;font-size:12px}
.right{text-align:right}
.tools{margin:10px 0;display:flex;gap:8px;flex-wrap:wrap}
.note{background:#eef5f4;border-left:4px solid var(--teal);padding:8px 12px;font-size:13px;margin:8px 0}
.segh{font-weight:bold;color:var(--navy);margin:18px 0 8px;padding:4px 0 4px 10px;border-left:6px solid var(--teal);font-size:15px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.scard{background:#fff;border:1px solid #dbe3e2;border-radius:8px;padding:10px 12px;cursor:pointer;transition:box-shadow .15s}
.scard:hover{box-shadow:0 2px 12px rgba(0,0,0,.14)}
.sc-top{display:flex;justify-content:space-between;align-items:center}
.sc-top b{color:var(--navy)}
.tag{background:var(--grey);border-radius:10px;padding:1px 8px;font-size:11px}
.sc-prod{font-weight:bold;margin:3px 0}
.small{font-size:11px}
.sc-eta{margin:4px 0}
.daysb{color:#1f2d2b;border-radius:8px;padding:1px 7px;font-size:11px;font-weight:bold}
.alertb{margin-top:6px;background:var(--red);color:#9c0006;font-weight:bold;border-radius:5px;padding:3px 6px;font-size:12px}
.pend{margin-top:6px;font-size:11px;color:#5a4a1e;background:#fdf6e3;border-radius:5px;padding:3px 6px}
.panel{background:#fff;border:1px solid #dbe3e2;border-left:5px solid var(--teal);border-radius:8px;padding:12px 14px;margin:10px 0}
.ph{font-weight:bold;color:var(--navy);margin-bottom:8px}
.kpis{display:flex;gap:22px;flex-wrap:wrap;margin-bottom:10px}
.kpi{text-align:center}
.kn{font-size:20px;font-weight:bold}
.kl{font-size:11px;color:#666}
.actions{display:flex;flex-direction:column;gap:2px}
.actline{cursor:pointer;font-size:13px;padding:3px 6px;border-radius:4px}
.actline:hover{background:var(--grey)}
.docbox{border:1px solid #dbe3e2;border-radius:5px;padding:6px;max-height:130px;overflow:auto;margin-top:2px}
.docrow{font-size:12px;padding:2px 0}
.doclink{cursor:pointer;color:var(--teal)}
.doclink:hover{text-decoration:underline}
.scard.exp{grid-column:1/-1;cursor:default}
.exgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px 14px;margin:8px 0}
.exgrid>div{font-size:12px;color:var(--ink)}
.exl{display:block;color:#8a8a8a;font-size:10px;text-transform:uppercase;letter-spacing:.3px}
.exsec{font-size:12px;margin:6px 0;background:#f7faf9;border-radius:5px;padding:6px}
.exsec .exl{margin-bottom:3px}
.filterbar input,.filterbar select{padding:6px;border:1px solid #b9c6c4;border-radius:5px;font-size:13px}
.filterbar #fq{flex:1;min-width:200px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:99;padding:16px}
.modal{background:#fff;border-radius:10px;padding:18px;max-width:680px;width:100%;max-height:90vh;overflow:auto}
.modal h3{margin-top:0;color:var(--navy)}
.edgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.edf{display:flex;flex-direction:column;font-size:12px;gap:2px;margin-top:6px}
.edf span{color:#555;font-weight:bold}
.modal textarea{width:100%;font-family:inherit;font-size:13px;padding:5px;border:1px solid #b9c6c4;border-radius:4px}
@media(max-width:600px){.edgrid{grid-template-columns:1fr}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
</head>
<body>
<header>
  <h1>Herramienta de Comercio Exterior — Luminatec</h1>
  <div class="actions">
    <button onclick="exportData()">Exportar respaldo</button>
    <button class="sec" onclick="document.getElementById('imp').click()">Importar respaldo</button>
    <input type="file" id="imp" style="display:none" accept="application/json" onchange="importData(event)">
  </div>
</header>
<div id="syncbar" class="muted" style="padding:6px 0 0;font-size:13px"></div>
<nav id="nav"></nav>
<main>
  <section id="tab-inst" class="tab"></section>
  <section id="tab-param" class="tab"></section>
  <section id="tab-pe" class="tab"></section>
  <section id="tab-ar" class="tab"></section>
  <section id="tab-seg" class="tab"></section>
  <section id="tab-resumen" class="tab"></section>
  <section id="tab-maestro" class="tab"></section>
</main>

<script>
// ---------- estado + persistencia ----------
const LS="comex_luminatec_v1";
const defaults={
 params:{ar_tasa:0.03,ar_t1:180,ar_t2:3000,ar_t3:30000,ar_t4:150000,ar_iva:0.21,ar_ivar:0.105,ar_pIva:0.20,ar_pIvaR:0.10,ar_pGan:0.06,ar_arancel:10,
         pe_igv:0.16,pe_ipm:0.02,pe_pIgvGen:0.035,pe_pIgv1:0.10,pe_pIgvU:0.05},
 ar:{tc:1442,flete:0,seguro:0,arancel:10,agente:0,honor:0,terminal:0,otros:0,iibb:0,tasaOv:"",margenObj:0,items:[{sku:"",desc:"",ncm:"",qty:0,fob:0,der:0,ivaR:0.21,pvp:0}]},
 pe:{tc:3.75,flete:0,seguro:0,isc:0,agente:0,almac:0,transp:0,otros:0,pIgv:0.035,margenObj:0,items:[{sku:"",desc:"",ncm:"",qty:0,fob:0,adv:0,pvp:0}]},
 seg:[],
 seeded:false,
 seededPagos:false,
 ivaMaster:{},derMaster:{},ncmMaster:{},descMaster:{}
};
let S=load();
function load(){try{const d=JSON.parse(localStorage.getItem(LS));return d?deepMerge(structuredClone(defaults),d):structuredClone(defaults);}catch(e){return structuredClone(defaults);}}
function deepMerge(a,b){for(const k in b){if(b[k]&&typeof b[k]==="object"&&!Array.isArray(b[k]))deepMerge(a[k]=a[k]||{},b[k]);else a[k]=b[k];}return a;}
function save(){localStorage.setItem(LS,JSON.stringify(S));scheduleCloudPush();}
const money=n=>isFinite(n)?n.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}):"–";
const pct=n=>isFinite(n)?(n*100).toLocaleString('es-AR',{minimumFractionDigits:1,maximumFractionDigits:1})+"%":"–";
const num=v=>{const n=parseFloat(v);return isFinite(n)?n:0;};

// ---------- navegación ----------
const tabs=[["inst","Instrucciones"],["param","Parámetros"],["pe","Costeo Perú"],["ar","Costeo Argentina"],["seg","Seguimiento"],["maestro","Maestro"],["resumen","Resumen"]];
const nav=document.getElementById("nav");
tabs.forEach(([id,label])=>{const b=document.createElement("button");b.textContent=label;b.onclick=()=>show(id);b.id="nav-"+id;nav.appendChild(b);});
function show(id){tabs.forEach(([t])=>{document.getElementById("tab-"+t).classList.toggle("active",t===id);document.getElementById("nav-"+t).classList.toggle("active",t===id);});}

// ---------- Instrucciones ----------
document.getElementById("tab-inst").innerHTML=`
<h2>Instrucciones</h2>
<div class="card">
<p><b>Qué es:</b> herramienta única para costear la nacionalización de importaciones (Perú y Argentina) y dar seguimiento a los embarques. Reemplaza el trabajo operativo del área de COMEX.</p>
<p><b>Cómo se usa:</b> completá los campos en <span style="background:var(--cream);padding:1px 5px">crema</span> (son editables). Los resultados se calculan solos. Para <b>carga masiva</b>, usá “Importar factura (Excel/CSV)” en cada calculadora: detecta las columnas de SKU, descripción, cantidad y precio unitario; o pegá las filas con “Pegar desde Excel”.</p>
<p><b>Metodología (clave):</b> al <b>costo</b> del producto van derechos/ad valorem, tasa de estadística, arancel y gastos (despachante, flete local, terminal). El <b>IVA/IGV y las percepciones NO son costo</b>: son crédito fiscal recuperable, aunque sí desembolso de caja. Se muestran por separado (en gris). Los costos del embarque se prorratean entre los SKU según su participación en el FOB (PPP), igual que el costeo real.</p>
<p><b>Datos y respaldo:</b> todo se guarda en este navegador automáticamente. Usá <b>“Exportar respaldo”</b> para guardar un archivo en OneDrive y <b>“Importar respaldo”</b> para restaurarlo o pasarlo a otra máquina.</p>
<p><b>Validado:</b> la calculadora de Argentina se contrastó contra un costeo real de un embarque y reprodujo el mismo costo activado.</p>
<div class="note">Aviso: las tasas cargadas son las vigentes verificadas a 2026-07. No reemplazan la liquidación oficial del despachante. En Argentina, confirmá tasa de estadística y percepciones antes de operaciones grandes.</div>
</div>`;

// ---------- Parámetros ----------
function fmtTs(s){try{return new Date(s).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}catch(e){return s;}}
async function grabJson(u,ms){const c=new AbortController();const t=setTimeout(()=>c.abort(),ms);try{const r=await fetch(u,{signal:c.signal});clearTimeout(t);return await r.json();}catch(e){clearTimeout(t);return null;}}
async function fetchRates(){const m=document.getElementById('ratesMsg');if(m)m.textContent='Actualizando…';let ars=null,pen=null,err=[];
 const a=await grabJson('https://dolarapi.com/v1/dolares/oficial',7000);if(a&&a.venta)ars=a.venta;else err.push('ARS (BNA)');
 const p=await grabJson('https://open.er-api.com/v6/latest/USD',7000);if(p&&p.rates&&p.rates.PEN)pen=p.rates.PEN;else err.push('PEN');
 if(ars)S.ar.tc=ars;if(pen)S.pe.tc=pen;S.tcInfo={ars,pen,ts:new Date().toISOString(),src:'BNA oficial (dolarapi) + USD/PEN (er-api)'};save();renderParam();renderAR();renderPE();
 const m2=document.getElementById('ratesMsg');if(m2)m2.textContent=err.length?('No se pudo traer: '+err.join(', ')+' — cargalo a mano.'):('Actualizado ✓ '+fmtTs(S.tcInfo.ts));}
function dateFromDays(d){const x=new Date();x.setHours(0,0,0,0);x.setDate(x.getDate()+d);return x.toISOString().slice(0,10);}
function timelineHTML(){const H=90;const ev=[];const over=[];const noDate=[];
 S.seg.forEach(r=>{if(r.eta&&r.estado!=='Entregado'&&r.estado!=='Nacionalizado'){const d=diasETA(r.eta);if(d!=null){if(d>=0&&d<=H)ev.push({d,label:(r.id||'')+' · arribo',color:'#2f6f8f'});else if(d<0)over.push((r.id||'')+' arribo venc. '+(-d)+'d');}}
  (r.pagos||[]).forEach(p=>{if(!p.pagado){const lab=(r.id||'')+' · '+(p.concepto||'pago')+(p.monto?(' USD '+money(num(p.monto))):'');if(p.fecha){const d=diasETA(p.fecha);if(d!=null){if(d>=0&&d<=H)ev.push({d,label:lab,color:'#c0662e'});else if(d<0)over.push(lab+' venc. '+(-d)+'d');}}else{noDate.push(lab);}}});});
 ev.sort((a,b)=>a.d-b.d);
 if(!ev.length&&!over.length&&!noDate.length)return '<div class="card"><h3>Línea de tiempo — próximos 90 días</h3><div class="muted">Sin arribos ni vencimientos de pago en la ventana.</div></div>';
 const grid=[15,30,45,60,75].map(g=>'<div class="tlgrid" style="left:'+(g/H*100)+'%"><span>'+g+'d</span></div>').join('');
 const marks=ev.map(e=>'<div class="tlmark" style="left:'+(e.d/H*100).toFixed(1)+'%;background:'+e.color+'" title="+'+e.d+'d ('+fmtD(dateFromDays(e.d))+'): '+e.label.replace(/"/g,'&quot;')+'"></div>').join('');
 const list=ev.map(e=>'<div class="tlrow"><span class="tldot" style="background:'+e.color+'"></span><b>+'+e.d+'d</b> · '+fmtD(dateFromDays(e.d))+' · '+e.label+'</div>').join('');
 return '<div class="card"><h3>Línea de tiempo — próximos 90 días</h3><div class="muted small">🔵 arribos · 🟠 pagos'+(over.length?(' · ⚠ vencidos: '+over.join('; ')):'')+'</div><div class="tlbar">'+grid+marks+'<div class="tlnow"></div></div><div class="tllist">'+list+'</div>'+(noDate.length?'<div class="muted small" style="margin-top:8px">💲 Pagos pendientes <b>sin fecha de vencimiento</b> (no se ubican en la línea): '+noDate.join('; ')+'. Cargales el vencimiento en la tarjeta para verlos acá.</div>':'')+'</div>';}
async function loadCardDocs(ix){const el=document.getElementById('cd_'+ix);if(!el)return;const r=S.seg[ix];
 if(!FSA||!fsGranted){el.innerHTML='<span class="exl">Documentos</span> <span class="muted small">Conectá la carpeta (arriba en Seguimiento) para abrir archivos.</span>';return;}
 if(!r.id){el.innerHTML='';return;}
 let dh=null;try{dh=await ensureFolder(r.id,false);}catch(e){}
 if(!dh){el.innerHTML='<span class="exl">Documentos</span> <span class="muted small">Sin carpeta para '+r.id+' todavía.</span>';return;}
 let files=[];try{for await(const [n,hh] of dh.entries()){if(hh.kind==='file')files.push(n);}}catch(e){}
 if(!files.length){el.innerHTML='<span class="exl">Documentos</span> <span class="muted small">Carpeta vacía.</span>';return;}
 const want=[['bl','BL/HBL'],['despacho','Despacho/Provisorio'],['liquid','Liquidación'],['fcprov','Factura'],['swift','Swift'],['packing','Packing'],['fflete','Flete']];
 const byKey={};files.forEach(f=>{const k=guessDocKey(f);if(k&&!byKey[k])byKey[k]=f;});
 const esc=s=>String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
 const chips=want.filter(w=>byKey[w[0]]).map(w=>'<button class="mini" data-fn="'+esc(byKey[w[0]])+'">📄 '+w[1]+'</button>').join(' ');
 el.innerHTML='<span class="exl">Documentos ('+files.length+' en carpeta)</span> '+(chips||'<span class="muted small">Sin documentos clave reconocidos.</span>')+' <button class="mini sec" data-edit="1">Ver todos</button>';
 el.querySelectorAll('button[data-fn]').forEach(b=>b.onclick=()=>openDoc(r.id,b.getAttribute('data-fn')));
 const eb=el.querySelector('button[data-edit]');if(eb)eb.onclick=()=>openEdit(ix);}
function renderParam(){
 const p=S.params;
 const row=(k,label,isPct=true)=>`<div class="field"><label>${label}</label><input class="in" value="${isPct?(p[k]*100):p[k]}" onchange="setParam('${k}',this.value,${isPct})">${isPct?'<span class="muted">%</span>':'<span class="muted">USD</span>'}</div>`;
 document.getElementById("tab-param").innerHTML=`
 <h2>Parámetros — tasas e impuestos</h2>
 <div class="note">Editá acá cuando cambie un impuesto y actualizá tu registro. Todas las calculadoras usan estos valores.</div>
 <div class="card" style="margin-bottom:12px"><h3>Cotizaciones (tipo de cambio)</h3>
  <div class="muted small">${S.tcInfo?('Última actualización: '+fmtTs(S.tcInfo.ts)+' · '+S.tcInfo.src):'Todavía sin traer automáticamente. Cargalo a mano o tocá Actualizar.'}</div>
  <div class="grid2" style="margin-top:8px">
   <div class="field"><label>USD → ARS (BNA oficial)</label><input class="in" value="${num(S.ar.tc)}" onchange="S.ar.tc=num(this.value);save();renderAR()"></div>
   <div class="field"><label>USD → PEN</label><input class="in" value="${num(S.pe.tc)}" onchange="S.pe.tc=num(this.value);save();renderPE()"></div>
  </div>
  <div class="tools" style="margin-top:8px"><button onclick="fetchRates()">↻ Actualizar cotizaciones</button> <span id="ratesMsg" class="muted small"></span></div>
  <div class="note">Trae el dólar oficial (BNA) para Argentina y el USD/PEN para Perú. Si tu red bloquea las fuentes, cargalo a mano arriba. El costeo usa estos valores.</div>
 </div>
 <div class="grid">
  <div class="card"><h3>Argentina (ARCA)</h3>
   ${row('ar_tasa','Tasa de estadística')}
   ${row('ar_t1','Tope tasa — base ≤ USD 10.000',false)}
   ${row('ar_t2','Tope tasa — base 10.000–100.000',false)}
   ${row('ar_t3','Tope tasa — base 100.000–1.000.000',false)}
   ${row('ar_t4','Tope tasa — base > 1.000.000',false)}
   ${row('ar_iva','IVA general')}
   ${row('ar_ivar','IVA reducido')}
   ${row('ar_pIva','Percepción IVA general')}
   ${row('ar_pIvaR','Percepción IVA reducida')}
   ${row('ar_pGan','Percepción Ganancias')}
   ${row('ar_arancel','Arancel SIM (fijo)',false)}
  </div>
  <div class="card"><h3>Perú (SUNAT)</h3>
   ${row('pe_igv','IGV')}
   ${row('pe_ipm','IPM')}
   ${row('pe_pIgvGen','Percepción IGV — general')}
   ${row('pe_pIgv1','Percepción IGV — 1ra import./riesgo')}
   ${row('pe_pIgvU','Percepción IGV — usados')}
   <p class="muted">Derechos ad valorem (0/4/6/11%) y derechos de importación (por NCM) se cargan por ítem en cada calculadora.</p>
  </div>
 </div>`;
}
function setParam(k,v,isPct){S.params[k]=isPct?num(v)/100:num(v);save();renderAR();renderPE();}

// ---------- Costeo genérico ----------
function capAR(base){const p=S.params;return base<=10000?p.ar_t1:base<=100000?p.ar_t2:base<=1000000?p.ar_t3:p.ar_t4;}

function computeAR(){
 const d=S.ar,p=S.params;
 const fobTot=d.items.reduce((s,i)=>s+num(i.qty)*num(i.fob),0);
 const items=d.items.map(i=>{const fob=num(i.qty)*num(i.fob);const part=fobTot?fob/fobTot:0;const cif=fob+(num(d.flete)+num(d.seguro))*part;const der=cif*num(i.der);return{...i,fob,part,cif,der};});
 const cifTot=items.reduce((s,i)=>s+i.cif,0);
 const derTot=items.reduce((s,i)=>s+i.der,0);
 const tasa=d.tasaOv!==""&&d.tasaOv!=null?num(d.tasaOv):Math.min(p.ar_tasa*cifTot,capAR(cifTot));
 const arancel=num(d.arancel),gastos=num(d.agente)+num(d.honor)+num(d.terminal)+num(d.otros);
 const costoNac=derTot+tasa+arancel+gastos;
 const landed=cifTot+costoNac;
 const baseImp=cifTot+derTot+tasa+arancel;
 const perItem=items.map(i=>{const nac=i.der+(tasa+arancel+gastos)*i.part;const lt=i.cif+nac;const lu=num(i.qty)?lt/num(i.qty):0;const pvp=num(i.pvp);const mar=pvp>0?(pvp-lu)/pvp:null;const ivaR=(i.ivaR!=null&&i.ivaR!=="")?num(i.ivaR):p.ar_iva;const baseI=i.cif+i.der+(tasa+arancel)*i.part;return{...i,nac,lt,lu,luLoc:lu*num(d.tc),pvp,mar,ivaItem:ivaR*baseI,pIvaItem:(ivaR>=p.ar_iva?p.ar_pIva:p.ar_pIvaR)*baseI};});
 const iva=perItem.reduce((s,x)=>s+x.ivaItem,0),pIva=perItem.reduce((s,x)=>s+x.pIvaItem,0),pGan=p.ar_pGan*baseImp,iibb=num(d.iibb);
 const recup=iva+pIva+pGan+iibb;
 const desemb=costoNac+recup;
 const venta=perItem.reduce((s,x)=>s+x.pvp*num(x.qty),0);
 return{fobTot,cifTot,derTot,tasa,arancel,gastos,costoNac,landed,iva,pIva,pGan,iibb,recup,desemb,perItem,venta,ganancia:venta-landed,margenTot:venta>0?(venta-landed)/venta:null,gastoPct:fobTot?costoNac/fobTot:0};
}
function computePE(){
 const d=S.pe,p=S.params;
 const fobTot=d.items.reduce((s,i)=>s+num(i.qty)*num(i.fob),0);
 const items=d.items.map(i=>{const fob=num(i.qty)*num(i.fob);const part=fobTot?fob/fobTot:0;const cif=fob+(num(d.flete)+num(d.seguro))*part;const adv=cif*num(i.adv);return{...i,fob,part,cif,adv};});
 const cifTot=items.reduce((s,i)=>s+i.cif,0);
 const advTot=items.reduce((s,i)=>s+i.adv,0);
 const isc=num(d.isc),gastos=num(d.agente)+num(d.almac)+num(d.transp)+num(d.otros);
 const baseIgv=cifTot+advTot+isc;
 const igv=p.pe_igv*baseIgv,ipm=p.pe_ipm*baseIgv;
 const pIgv=num(d.pIgv)*(baseIgv+igv+ipm);
 const costoNac=advTot+isc+gastos;
 const landed=cifTot+costoNac;
 const recup=igv+ipm+pIgv;
 const desemb=costoNac+recup;
 const perItem=items.map(i=>{const nac=i.adv+(isc+gastos)*i.part;const lt=i.cif+nac;const lu=num(i.qty)?lt/num(i.qty):0;const pvp=num(i.pvp);const mar=pvp>0?(pvp-lu)/pvp:null;return{...i,nac,lt,lu,luLoc:lu*num(d.tc),pvp,mar};});
 const venta=perItem.reduce((s,x)=>s+x.pvp*num(x.qty),0);
 return{fobTot,cifTot,advTot,isc,gastos,igv,ipm,pIgv,costoNac,landed,recup,desemb,perItem,venta,ganancia:venta-landed,margenTot:venta>0?(venta-landed)/venta:null,gastoPct:fobTot?costoNac/fobTot:0};
}

async function autoFillFromFolder(ix,c){const r=S.seg[ix];const dk=c==='ar'?'der':'adv';const dh=await findSub(r.id);if(!dh)return 0;
 const prov=(r.prov||'').toLowerCase().replace(/[^a-z0-9]/g,'');
 const esProveedor=n=>{const sa=n.toLowerCase().replace(/[^a-z0-9]/g,'');return sa.includes('petdur')||(prov&&prov.length>2&&sa.includes(prov));};
 const score=n=>{n=n.toLowerCase();let s=0;if(/\bci\b|commercial|invoice|factura|proforma|\bpi\b/.test(n))s+=3;if(/fanttik|order|pedido/.test(n))s+=1;return s;};
 let all=[];try{for await(const [n,h] of dh.entries()){if(h.kind==='file'&&/\.(xlsx?|pdf)$/i.test(n)&&!/^~\$/.test(n))all.push([n,h]);}}catch(e){return 0;}
 const tryFiles=async list=>{for(const [n,h] of list){try{let best=[];
   if(/\.pdf$/i.test(n)){const lines=await readPdfText(await h.getFile());best=detectItems(lines.map(l=>l.split(/\s{2,}/)),dk);}
   else{if(typeof XLSX==='undefined')continue;const wb=XLSX.read(new Uint8Array(await (await h.getFile()).arrayBuffer()),{type:'array'});wb.SheetNames.forEach(sn=>{const it=detectItems(XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''}),dk);if(it.length>best.length)best=it;});}
   if(best.length){if(c==='ar')learnFillProd(best);S[c].items=best;save();setTimeout(()=>alert(best.length+' ítems traídos de "'+n+'".\nRevisá % de derecho (el IVA se autocompleta del maestro por SKU).'),80);return best.length;}
  }catch(e){}}return 0;};
 // 1) facturas de PETDUR / proveedor (Excel antes que PDF)
 const prv=all.filter(f=>esProveedor(f[0])).sort((a,b)=>(/\.pdf$/i.test(a[0])?1:0)-(/\.pdf$/i.test(b[0])?1:0));
 let n=await tryFiles(prv);if(n)return n;
 // 2) fallback: cualquier Excel de la carpeta (excepto el propio costeo)
 const xls=all.filter(f=>/\.xlsx?$/i.test(f[0])&&!esProveedor(f[0])&&!/coste|costo/i.test(f[0])).sort((a,b)=>score(b[0])-score(a[0]));
 return await tryFiles(xls);}

const ESTADOS=["Orden de compra","En producción","Embarcado","En tránsito","Arribado","En despacho","Nacionalizado","Entregado"];
const DOC_CAT=[["orden","Orden / Reserva",0],["proforma","Factura proforma",1],["fcprov","Factura comercial del proveedor",2],["swift","Swift / comprobante de pago a proveedor",2],["packing","Packing list",2],["bl","BL / HBL",2],["fflete","Factura de flete / agente de carga",3],["aviso","Aviso de llegada",4],["despacho","Despacho / DI (provisorio)",5],["fterminal","Factura de terminal",5],["gastos","Gastos de agente / honorarios",5],["dioficial","DI oficializada",6],["boletas","Boletas de pago de impuestos",6],["liquid","Liquidación final del despachante",6]];
function estadoIdx(e){return ESTADOS.indexOf(e);}
function docsExpected(r){const i=estadoIdx(r.estado);return i<0?[]:DOC_CAT.filter(d=>d[2]<=i);}
function docsPend(r){const ch=r.docsChk||{};return docsExpected(r).filter(d=>!ch[d[0]]);}
const PAISES=["Perú","Argentina"];const MODOS=["Marítimo","Aéreo","Terrestre","Plaza"];
const SEGCOLS=[["id","Embarque ID"],["pais","País"],["prov","Proveedor"],["prod","Producto/Marca"],["origen","Origen"],["modo","Modo"],["inco","Incoterm"],["estado","Estado"],["fOrden","Fecha orden"],["etd","ETD"],["eta","ETA"],["fOfic","Fecha ofic."],["fLib","Fecha liber."],["docs","Docs pendientes"],["despa","Despachante"],["notas","Notas"],["costEst","Costo est. USD"],["costReal","Costo real USD"]];
function diasETA(eta){if(!eta)return null;const d=Math.round((new Date(eta)-new Date().setHours(0,0,0,0))/86400000);return d;}
function alerta(r){if(r.estado==="Entregado")return "";const dias=diasETA(r.eta);const pend=docsPend(r);if(dias!=null&&dias<0&&r.estado!=="Entregado"&&r.estado!=="Nacionalizado")return "Arribo vencido sin cerrar";if(pend.length&&dias!=null&&dias<=7&&dias>=0)return "Faltan docs y arribo próximo";if(r.docs&&dias!=null&&dias<=7&&dias>=0)return "Tareas pendientes y arribo próximo";return "";}
function pagosInfo(r){const ps=r.pagos||[];const pend=ps.filter(p=>!p.pagado);let next=null;pend.forEach(p=>{if(p.fecha){const d=diasETA(p.fecha);if(next==null||(d!=null&&d<next.d))next={p,d};}});return {tot:ps.length,pagados:ps.filter(p=>p.pagado).length,pend:pend.length,saldo:pend.reduce((s,p)=>s+num(p.monto),0),next};}
function estadoColor(e){return {"Orden de compra":"#8a9a97","En producción":"#c08a2e","Embarcado":"#2c7a70","En tránsito":"#2f6f8f","Arribado":"#3a6ea5","En despacho":"#c0662e","Nacionalizado":"#3a8f57","Entregado":"#2e7d32","Sin estado":"#8a9a97"}[e]||"#8a9a97";}

 const active=rows.filter(x=>x.r.estado!=="Entregado");

 const seen={};const actions=[];
 soon.forEach(x=>{seen[x.ix]=1;actions.push({ix:x.ix,txt:`<b>${x.r.id||'(sin ID)'}</b> · ${x.r.prod||''} — ${x.d<0?'arribo vencido hace '+(-x.d)+'d':(x.d===0?'arriba hoy':'arriba en '+x.d+'d')}`,urg:x.d});});
 alerts.forEach(x=>{if(!seen[x.ix]){seen[x.ix]=1;actions.push({ix:x.ix,txt:`<b>${x.r.id||''}</b> · ${x.a}`,urg:-50});}});
 duePagos.forEach(x=>{actions.push({ix:x.ix,txt:`<b>${x.r.id||''}</b> · pago ${x.p.concepto||''} USD ${money(num(x.p.monto))} — ${x.d<0?'vencido hace '+(-x.d)+'d':(x.d===0?'vence hoy':'vence en '+x.d+'d')}`,urg:x.d-0.1});});
 S.seg.forEach((r,ix)=>{if(r.estado==="Entregado")return;const p=docsPend(r);const dd=diasETA(r.eta);if(p.length&&((dd!=null&&dd<=7)||r.estado==="Arribado"||r.estado==="En despacho")&&!seen[ix]){seen[ix]=1;actions.push({ix,txt:`<b>${r.id||''}</b> · faltan docs: ${p.slice(0,3).map(x=>x[1]).join(', ')}${p.length>3?'…':''}`,urg:-20});}});

 const list=actions.length?actions.map(a=>`<div class="actline" onclick="openEdit(${a.ix})">▸ ${a.txt}</div>`).join(''):`<div class="muted">Nada urgente por ahora 👍</div>`;
 return `<div class="panel"><div class="ph">📌 Acción requerida hoy</div>
  <div class="kpis">${kpi(active.length,'Embarques activos')}${kpi(soon.length,'Arriban ≤ 7 días',soon.length?'#c0662e':'var(--navy)')}${kpi(duePagos.length,'Pagos por vencer',duePagos.length?'#c0662e':'var(--navy)')}${kpi(alerts.length,'Alertas',alerts.length?'#9c0006':'var(--navy)')}${kpi('USD '+money(val),'Provisorio en curso')}</div>
  <div class="actions">${list}</div></div>`;
}

function guessDocKey(fn){fn=fn.toLowerCase();
 if(/pack.?list|packing|[-_ ]pl[-_ .]|[-_ ]pl$/.test(fn))return 'packing';
 if(/^bl[-_ .]|hbl|b\/l|bill.?of.?lading|[-_ ]bl[-_ .]|[-_ ]bl$|draft.*bl|bl.*draft|trb\d/.test(fn))return 'bl';
 if(/swift|comprobante.*pago|payment/.test(fn))return 'swift';
 if(/aviso|llegada|arrival|cmi\d/.test(fn))return 'aviso';
 if(/provi|despacho|declarac|[-_ ]di[-_ ]/.test(fn))return 'despacho';
 if(/terminal|[-_ ]t4[-_ .]|tef/.test(fn))return 'fterminal';
 if(/boleta|[-_ ]vep\b/.test(fn))return 'boletas';
 if(/liquidac|hoja.*costo|liq[-_ ]/.test(fn))return 'liquid';
 if(/flete|freight|forwarder|from[-_ ]trice|trice[-_ ]llc/.test(fn))return 'fflete';
 if(/proforma|^pi[-_ ]|[-_ ]pi[-_ ]/.test(fn))return 'proforma';
 if(/factura|invoice|commercial.?invoice|[-_ ]ci[-_ ]|ci_|[-_ ]inv[-_ ]|ataf|101_a|[-_ ]a\d{3}/.test(fn))return 'fcprov';
 if(/orden|order|reserva|rsv|orderstatus/.test(fn))return 'orden';
 return null;}
async function autoMarkDocs(ix){const r=S.seg[ix];if(!fsGranted||!r.id){alert('Conectá la carpeta y guardá el ID primero.');return;}const dh=await ensureFolder(r.id,false);if(!dh){alert('No encontré la carpeta de '+r.id);return;}let files=[];try{for await(const [n,hh] of dh.entries()){if(hh.kind==='file')files.push(n);}}catch(e){}r.docsChk=r.docsChk||{};let cnt=0;files.forEach(f=>{const k=guessDocKey(f);if(k&&!r.docsChk[k]){r.docsChk[k]=true;cnt++;}});save();renderDocChk(ix);alert(cnt?('Marqué '+cnt+' documento(s) detectado(s) por nombre de archivo. Revisá y ajustá lo que falte.'):'No detecté documentos nuevos por nombre. Marcá a mano los que tengas.');}
async function autoMarkAllDocs(){if(!FSA||!fsGranted){alert('Conectá primero la carpeta de documentos.');return;}
 let touched=0,marked=0,nofolder=[],detail=[];
 for(let ix=0;ix<S.seg.length;ix++){const r=S.seg[ix];if(!r.id)continue;
  let dh=null;try{dh=await ensureFolder(r.id,false);}catch(e){}
  if(!dh){nofolder.push(r.id);continue;}
  let files=[];try{for await(const [n,hh] of dh.entries()){if(hh.kind==='file')files.push(n);}}catch(e){continue;}
  r.docsChk=r.docsChk||{};let c=0;files.forEach(f=>{const k=guessDocKey(f);if(k&&!r.docsChk[k]){r.docsChk[k]=true;c++;}});
  if(c){marked+=c;touched++;detail.push(r.id+': +'+c);}}
 save();renderSeg();
 alert('Detección completa.\n'+marked+' documento(s) marcados en '+touched+' embarque(s).'+(detail.length?'\n\n'+detail.join('\n'):'')+(nofolder.length?'\n\nSin carpeta aún: '+nofolder.join(', '):''));}

function pnum(v){if(typeof v==='number')return v;if(v==null)return NaN;let s=String(v).replace(/[^0-9.,-]/g,'');if(!s)return NaN;const hasC=s.includes(','),hasD=s.includes('.');if(hasC&&hasD){if(s.lastIndexOf(',')>s.lastIndexOf('.'))s=s.replace(/\./g,'').replace(',','.');else s=s.replace(/,/g,'');}else if(hasC){s=s.replace(/\./g,'').replace(',','.');}return parseFloat(s);}
function parseCSV(txt){const raw=txt.split(/\r?\n/).filter(l=>l.trim()!=='');if(!raw.length)return [];
 const first=raw[0];const delim=first.indexOf('\t')>-1?'\t':((first.split(';').length>first.split(',').length)?';':',');
 return raw.map(line=>{const out=[];let cur='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];
   if(q){if(ch==='"'){if(line[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=ch;}
   else{if(ch==='"')q=true;else if(ch===delim){out.push(cur);cur='';}else cur+=ch;}}
  out.push(cur);return out.map(x=>x.trim());});}
function importFile(c,e){const f=e.target.files[0];if(!f)return;const n=f.name.toLowerCase();
 if(n.endsWith('.xlsx')||n.endsWith('.xls')){
   if(typeof XLSX==='undefined'){alert('Para leer Excel hace falta conexión a internet la primera vez que abrís la app. Sin conexión: exportá la factura a CSV o usá "Pegar desde Excel".');e.target.value='';return;}
   const r=new FileReader();r.onload=()=>{try{const wb=XLSX.read(new Uint8Array(r.result),{type:'array'});const dk=c==='ar'?'der':'adv';let best=[];wb.SheetNames.forEach(sn=>{const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:''});const it=detectItems(rows,dk);if(it.length>best.length)best=it;});if(!best.length){alert('No pude detectar columnas de Cantidad y Precio unitario en ninguna hoja del Excel. Usá "Plantilla" o "Pegar desde Excel".');return;}applyItems(c,best);}catch(x){alert('No pude leer el Excel: '+x.message);}};r.readAsArrayBuffer(f);
 }else if(n.endsWith('.pdf')){processPdf(c,f);}
 else{const r=new FileReader();r.onload=()=>loadRows(c,parseCSV(r.result));r.readAsText(f);}
 e.target.value='';}
function detectItems(rows,dk){
 if(!rows||!rows.length)return [];
 const skuPat=/^\s*L(?!UMI|UPE|UCL)[A-Za-z]*\d{2,}/i;
 const ncol=rows.reduce((m,r)=>Math.max(m,r?r.length:0),0);
 // ---- Camino 1: anclado en código L (SKU), cantidad/precio por cantidad×precio=total ----
 let skucol=-1,shits=0;for(let ci=0;ci<ncol;ci++){let h=0;rows.forEach(r=>{if(r&&skuPat.test(String((r[ci]!=null?r[ci]:'')).trim()))h++;});if(h>shits){shits=h;skucol=ci;}}
 if(skucol>=0&&shits>=2){
   const data=rows.filter(r=>r&&skuPat.test(String((r[skucol]!=null?r[skucol]:'')).trim()));
   const col=ci=>data.map(r=>pnum(ci<r.length?r[ci]:''));
   const isCode=ci=>{let n=0,t=0;data.forEach(r=>{const v=String(ci<r.length&&r[ci]!=null?r[ci]:'').trim();if(v){n++;if(skuPat.test(v)||/[A-Za-z]/.test(v))t++;}});return n&&t/n>0.5;};
   const numcols=[];for(let ci=0;ci<ncol;ci++){if(ci!==skucol&&!isCode(ci)&&col(ci).some(v=>isFinite(v)&&v>0))numcols.push(ci);}
   let best=null;
   for(const qi of numcols){const qv=col(qi);for(const fi of numcols){if(fi===qi)continue;const fv=col(fi);for(const ti of numcols){if(ti===qi||ti===fi)continue;const tv=col(ti);let ok=0,tot=0;for(let k=0;k<data.length;k++){const a=qv[k],b=fv[k],c=tv[k];if(isFinite(a)&&isFinite(b)&&isFinite(c)&&c>0){tot++;if(Math.abs(a*b-c)<=Math.max(0.5,c*0.02))ok++;}}if(tot>=2&&ok>=tot*0.8){const qn=qv.filter(v=>isFinite(v));const intr=qn.filter(v=>Math.abs(v-Math.round(v))<1e-6).length/Math.max(1,qn.length);const sc=(ok/tot)+intr-fi*0.05-(qi+ti)*0.002;if(!best||sc>best.sc)best={sc,qi,fi,ti};}}}}
   if(best){
     const txt=ci=>{let n=0,t=0;data.forEach(r=>{const v=String(ci<r.length&&r[ci]!=null?r[ci]:'').trim();if(v){n++;if(/[A-Za-z]/.test(v)&&!skuPat.test(v)&&!/^(LUMI|LUPE|LUCL)/i.test(v)&&(/\s/.test(v)||(v.match(/[A-Za-z]/g)||[]).length>=3))t++;}});return n?t/n:0;};
     let desccol=-1,dd=1e9;for(let ci=0;ci<ncol;ci++){if(ci===skucol||ci===best.qi||ci===best.fi||ci===best.ti)continue;if(txt(ci)>0.5&&Math.abs(ci-skucol)<dd){dd=Math.abs(ci-skucol);desccol=ci;}}
     let ivacol=-1;for(let ci=0;ci<ncol;ci++){if([skucol,best.qi,best.fi,best.ti].includes(ci))continue;const vs=col(ci).filter(v=>isFinite(v));if(vs.length>=2&&vs.filter(v=>[0.21,0.105,0.10,0.27].some(x=>Math.abs(v-x)<0.001)).length>=vs.length*0.6){ivacol=ci;break;}}
     let ncmcol=-1;for(let rr=0;rr<Math.min(rows.length,8)&&ncmcol<0;rr++){(rows[rr]||[]).forEach((cell,ci)=>{if(ncmcol<0&&/ncm|posici|partida|hs ?code/i.test(String(cell)))ncmcol=ci;});}
     const items=[];for(const r of data){const q=pnum(r[best.qi]),fb=pnum(r[best.fi]);if(!isFinite(q)||!isFinite(fb)||(q===0&&fb===0))continue;const it={sku:String(r[skucol]||'').trim(),desc:desccol>=0?String(r[desccol]||'').trim():'',qty:q,fob:fb,ncm:ncmcol>=0?String(r[ncmcol]||'').trim():''};it[dk]=0;if(ivacol>=0){let iv=pnum(r[ivacol]);if(isFinite(iv)&&iv>0){if(iv>1)iv/=100;it.ivaR=iv;}}items.push(it);}
     if(items.length)return items;
   }
 }
 // ---- Camino 2: por encabezado (facturas tipo CI, planillas simples) ----
 const pat={sku:/sku|c[oó]d|code|art[ií]c|model|part|\bref|solic/i,desc:/descrip|detalle|product|goods|name|nombre|art[ií]culo/i,qty:/cant|qty|quantit|unidad|pcs|pzas|q.?ty/i,fob:/fob|precio|price|unit|p\.?u|valor|cost/i,der:/derecho|advalor|ad ?valor|arancel|duty/i,ncm:/ncm|posici|partida|hs ?code/i,iva:/^\s*iva/i};
 let hdr=-1,map={};
 for(let r=0;r<Math.min(rows.length,25);r++){const row=(rows[r]||[]).map(x=>String(x));const m={};row.forEach((cell,ci)=>{for(const k in pat){if(m[k]==null&&pat[k].test(cell))m[k]=ci;}});if(m.qty!=null&&m.fob!=null&&(m.sku!=null||m.desc!=null)){hdr=r;map=m;break;}}
 const build=(dataRows,mp)=>{const items=[];for(const row of dataRows){const q=pnum(row[mp.qty]),fb=pnum(row[mp.fob]);if(!isFinite(q)||!isFinite(fb)||(q===0&&fb===0))continue;let d=mp.der!=null?pnum(row[mp.der]):0;if(!isFinite(d))d=0;if(d>1)d/=100;const it={sku:mp.sku!=null?String(row[mp.sku]||'').trim():'',desc:mp.desc!=null?String(row[mp.desc]||'').trim():'',qty:q,fob:fb,ncm:mp.ncm!=null?String(row[mp.ncm]||'').trim():''};it[dk]=d;if(mp.iva!=null){let iv=pnum(row[mp.iva]);if(isFinite(iv)&&iv>0){if(iv>1)iv/=100;it.ivaR=iv;}}items.push(it);}return items;};
 if(hdr>=0)return build(rows.slice(hdr+1),map);
 return build(rows,{sku:0,desc:1,qty:2,fob:3,der:4});
}
function learnFillProd(items){if(!S.ivaMaster)S.ivaMaster={};if(!S.derMaster)S.derMaster={};if(!S.ncmMaster)S.ncmMaster={};if(!S.descMaster)S.descMaster={};
 items.forEach(it=>{const k=(it.sku||'').trim();if(!k)return;
  const iv=num(it.ivaR);if(it.ivaR!=null&&it.ivaR!==''&&iv>0)S.ivaMaster[k]=iv;else if(S.ivaMaster[k]!=null)it.ivaR=S.ivaMaster[k];
  const dv=num(it.der);if(dv>0)S.derMaster[k]=dv;else if(S.derMaster[k]!=null)it.der=S.derMaster[k];
  const nc=(it.ncm==null?'':String(it.ncm)).trim();if(nc)S.ncmMaster[k]=nc;else if(S.ncmMaster[k]!=null)it.ncm=S.ncmMaster[k];
  const ds=(it.desc||'').trim();if(ds)S.descMaster[k]=ds;else if(S.descMaster[k])it.desc=S.descMaster[k];});
 save();}
function applyItems(c,items){

 save();c==='ar'?renderAR():renderPE();

function loadRows(c,rows){const dk=c==='ar'?'der':'adv';const items=detectItems(rows,dk);if(!items.length){alert('No pude detectar las columnas de Cantidad y Precio unitario. Descargá la "Plantilla" y pegá los datos con ese formato.');return;}applyItems(c,items);}
async function readPdfText(blob){if(typeof pdfjsLib==='undefined')throw new Error('El lector de PDF no cargó (requiere internet la primera vez que abrís la app).');const buf=await blob.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:buf}).promise;const lines=[];for(let p=1;p<=pdf.numPages;p++){const page=await pdf.getPage(p);const tc=await page.getTextContent();const byY={};tc.items.forEach(it=>{if(!it.str||!it.str.trim())return;const y=Math.round(it.transform[5]);(byY[y]=byY[y]||[]).push([it.transform[4],it.str]);});Object.keys(byY).map(Number).sort((a,b)=>b-a).forEach(y=>{lines.push(byY[y].sort((a,b)=>a[0]-b[0]).map(x=>x[1]).join('  '));});}return lines;}
async function processPdf(c,blob){let lines;try{lines=await readPdfText(blob);}catch(e){alert(e.message);return;}const dk=c==='ar'?'der':'adv';const rows=lines.map(l=>l.split(/\s{2,}/).map(x=>x.trim()));const items=detectItems(rows,dk);if(items.length){applyItems(c,items);}else{showPaste(c,lines.join('\n'));setTimeout(()=>alert('No pude estructurar el PDF automáticamente. Te dejo el texto extraído para que lo revises y pegues (columnas: SKU, Descripción, Cantidad, FOB unitario).'),120);}}
function showPaste(c,prefill){const ov=document.createElement('div');ov.style="position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:99";

  <textarea id="pasteBox" style="width:100%;height:160px">${prefill?String(prefill).replace(/&/g,'&amp;').replace(/</g,'&lt;'):''}</textarea>
  <div class="tools" style="justify-content:flex-end"><button class="sec" id="pcancel">Cancelar</button><button id="pok">Cargar</button></div></div>`;
 document.body.appendChild(ov);

const SEED=[];
function seedOps(){if(!S.seedIds)S.seedIds=S.seeded?S.seg.map(x=>x.id).filter(Boolean):[];const have=new Set(S.seg.map(x=>x.id));const known=new Set(S.seedIds);let changed=false;SEED.forEach(o=>{if(!have.has(o.id)&&!known.has(o.id)){S.seg.push(Object.assign({id:"",pais:"",prov:"",prod:"",origen:"",modo:"",inco:"",estado:"",fOrden:"",etd:"",eta:"",fOfic:"",fLib:"",docs:"",despa:"",notas:"",costEst:"",costReal:"",pagos:[]},o));changed=true;}if(!known.has(o.id)){S.seedIds.push(o.id);known.add(o.id);changed=true;}});if(!S.seeded){S.seeded=true;changed=true;}if(changed)save();}

const FSA=(typeof window!=='undefined')&&('showDirectoryPicker' in window);
let dirHandle=null, fsGranted=false;
function idbDo(mode,fn){return new Promise((res,rej)=>{const o=indexedDB.open('comexfs',1);o.onupgradeneeded=()=>o.result.createObjectStore('kv');o.onsuccess=()=>{const db=o.result,tx=db.transaction('kv',mode),st=tx.objectStore('kv'),rq=fn(st);tx.oncomplete=()=>res(rq&&rq.result);tx.onerror=()=>rej(tx.error);};o.onerror=()=>rej(o.error);});}
const idbSet=(k,v)=>idbDo('readwrite',st=>st.put(v,k));
const idbGet=k=>idbDo('readonly',st=>st.get(k));
async function restoreFolder(){if(!FSA)return;try{const h=await idbGet('dir');if(h){dirHandle=h;const p=await h.queryPermission({mode:'readwrite'});fsGranted=(p==='granted');}}catch(e){}renderSeg();}
async function connectFolder(){if(!FSA)return;try{if(dirHandle){const p=await dirHandle.requestPermission({mode:'readwrite'});if(p==='granted'){fsGranted=true;renderSeg();return;}}dirHandle=await window.showDirectoryPicker({mode:'readwrite'});fsGranted=true;await idbSet('dir',dirHandle);renderSeg();}catch(e){}}
async function findSub(id){if(!fsGranted||!dirHandle||!id)return null;
 try{return await dirHandle.getDirectoryHandle(id,{create:false});}catch(e){}
 try{for await(const [n,h] of dirHandle.entries()){if(h.kind==='directory'&&n!==id&&n.startsWith(id)&&!/\d/.test(n.charAt(id.length)))return h;}}catch(e){}
 return null;}
async function ensureFolder(id,create){if(!fsGranted||!dirHandle||!id)return null;const f=await findSub(id);if(f)return f;if(create){try{return await dirHandle.getDirectoryHandle(id,{create:true});}catch(e){return null;}}return null;}
async function refreshDocs(id){const box=document.getElementById('docbox');if(!box)return;
 if(!FSA){box.innerHTML='<span class="muted small">Requiere Edge/Chrome de escritorio.</span>';return;}
 if(!fsGranted){box.innerHTML='<span class="muted small">Conectá la carpeta de documentos (botón arriba en Seguimiento) para ver/crear la carpeta de este embarque.</span>';return;}
 if(!id){box.innerHTML='<span class="muted small">Poné un Embarque ID y Guardá: su carpeta se crea sola.</span>';return;}
 const dh=await ensureFolder(id,false);
 if(!dh){box.innerHTML=`<span class="muted small">Sin carpeta aún.</span> <button class="mini" onclick="makeDocs('${id}')">Crear carpeta ${id}</button>`;return;}
 let files=[];try{for await(const [n,h] of dh.entries()){if(h.kind==='file')files.push(n);}}catch(e){}
 files.sort();
 box.innerHTML=`<div class="muted small">📁 ${id} · ${files.length} archivo(s)</div>`+files.map(n=>`<div class="docrow"><span class="doclink" onclick="openDoc('${id}',this.textContent.slice(2))">📄 ${n}</span></div>`).join('')+`<button class="mini" onclick="document.getElementById('docup').click()">+ Agregar archivo</button><input type="file" id="docup" multiple style="display:none" onchange="addDocs('${id}',event)">`;
}
async function makeDocs(id){await ensureFolder(id,true);refreshDocs(id);}
async function addDocs(id,e){const dh=await ensureFolder(id,true);if(dh){for(const f of e.target.files){try{const fh=await dh.getFileHandle(f.name,{create:true});const w=await fh.createWritable();await w.write(f);await w.close();}catch(x){}}}e.target.value='';refreshDocs(id);}
async function openDoc(id,name){const dh=await ensureFolder(id,false);if(!dh)return;try{const fh=await dh.getFileHandle(name);const f=await fh.getFile();window.open(URL.createObjectURL(f),'_blank');}catch(x){}}
function renderResumen(){const seg=S.seg;const activos=seg.filter(r=>r.estado!=="Entregado");
 const byPais=p=>activos.filter(r=>r.pais===p);const val=arr=>arr.reduce((s,r)=>s+num(r.costEst),0);
 const saldoPend=seg.reduce((s,r)=>s+(r.pagos||[]).filter(p=>!p.pagado).reduce((a,p)=>a+num(p.monto),0),0);
 const dueRange=(lo,hi)=>{let s=0;seg.forEach(r=>{(r.pagos||[]).forEach(p=>{if(!p.pagado&&p.fecha){const d=diasETA(p.fecha);if(d!=null&&d>=lo&&d<=hi)s+=num(p.monto);}});const de=diasETA(r.eta);if(de!=null&&de>=lo&&de<=hi&&r.estado!=='Nacionalizado'&&r.estado!=='Entregado')s+=num(r.costEst);});return s;};const due15=dueRange(-99999,15),due30=dueRange(16,30),due60=dueRange(31,60);
 const kpi=(n,l,c)=>`<div class="kpi"><div class="kn" style="color:${c||'var(--navy)'}">${n}</div><div class="kl">${l}</div></div>`;
 const estCount=ESTADOS.map(e=>[e,seg.filter(r=>r.estado===e).length]).filter(x=>x[1]);
 const estTable=`<table><tr><th>Estado</th><th class="right">Embarques</th></tr>${estCount.map(x=>`<tr><td>${x[0]}</td><td class="right">${x[1]}</td></tr>`).join('')||'<tr><td colspan="2" class="muted">Sin datos</td></tr>'}</table>`;
 const paisRows=['Argentina','Perú'].map(p=>`<tr><td>${p}</td><td class="right">${byPais(p).length}</td><td class="right">${money(val(byPais(p)))}</td></tr>`).join('');
 document.getElementById('tab-resumen').innerHTML=`<h2>Resumen ejecutivo</h2>
  <div class="panel"><div class="kpis">${kpi(activos.length,'Embarques activos')}${kpi('USD '+money(val(activos)),'Valor provisorio en curso')}${kpi('USD '+money(saldoPend),'Saldo a pagar pendiente')}${kpi('USD '+money(due15),'Desembolsos 0–15 días',due15?'#c0662e':'var(--navy)')}${kpi('USD '+money(due30),'Desembolsos 16–30 días',due30?'#c0662e':'var(--navy)')}${kpi('USD '+money(due60),'Desembolsos 31–60 días',due60?'#c0662e':'var(--navy)')}</div></div>
  ${timelineHTML()}
  <div class="grid">
   <div class="card"><h3>Por país (activos)</h3><table><tr><th>País</th><th class="right">Embarques</th><th class="right">Provisorio USD</th></tr>${paisRows}</table></div>
   <div class="card"><h3>Por estado</h3>${estTable}</div>
  </div>
  <p class="muted">"Provisorio en curso" usa el costo estimado de cada embarque activo. Los "Desembolsos 0–15 / 16–30 / 31–60 días" son <b>tramos separados</b> (no se solapan): cada uno suma los pagos pendientes y los provisorios de nacionalización que caen en ese rango de días. El tramo 0–15 incluye lo vencido. Un tramo en cero significa que no hay desembolsos en esa ventana.</p>`;}
function maestroSKUs(){const s=new Set([...Object.keys(S.ivaMaster||{}),...Object.keys(S.derMaster||{}),...Object.keys(S.ncmMaster||{}),...Object.keys(S.descMaster||{})]);return [...s].sort();}

 document.getElementById('tab-maestro').innerHTML=`<h2>Maestro de productos (Argentina)</h2>

function setMaestro(sk,f,v){if(f==='desc'){S.descMaster=S.descMaster||{};if(String(v).trim())S.descMaster[sk]=String(v).trim();else delete S.descMaster[sk];save();return;}if(f==='ncm'){S.ncmMaster=S.ncmMaster||{};if(String(v).trim())S.ncmMaster[sk]=String(v).trim();else delete S.ncmMaster[sk];}else if(f==='der'){S.derMaster=S.derMaster||{};const n=num(v)/100;if(n>0)S.derMaster[sk]=n;else delete S.derMaster[sk];}else{S.ivaMaster=S.ivaMaster||{};const n=num(v)/100;if(n>0)S.ivaMaster[sk]=n;else delete S.ivaMaster[sk];}save();}

function importMaestro(e){const f=e.target.files[0];if(!f)return;
 const done=rows=>{if(!rows||rows.length<2){alert('Sin filas.');return;}const hdr=rows[0].map(h=>String(h).trim().toLowerCase());const find=re=>hdr.findIndex(h=>re.test(h));const ci={sku:find(/sku|c[oó]d|solic/),desc:find(/descrip|detalle|articul|producto|nombre/),ncm:find(/ncm|posici|partida|hs/),der:find(/derech|advalor|arancel/),iva:find(/iva/)};let n=0;S.ncmMaster=S.ncmMaster||{};S.derMaster=S.derMaster||{};S.ivaMaster=S.ivaMaster||{};S.descMaster=S.descMaster||{};
  for(let r=1;r<rows.length;r++){const row=rows[r];const sk=ci.sku>=0?String(row[ci.sku]||'').trim():'';if(!sk)continue;if(ci.desc>=0&&String(row[ci.desc]||'').trim())S.descMaster[sk]=String(row[ci.desc]).trim();if(ci.ncm>=0&&String(row[ci.ncm]||'').trim())S.ncmMaster[sk]=String(row[ci.ncm]).trim();if(ci.der>=0){let d=pnum(row[ci.der]);if(isFinite(d)&&d>0){if(d>1)d/=100;S.derMaster[sk]=d;}}if(ci.iva>=0){let v=pnum(row[ci.iva]);if(isFinite(v)&&v>0){if(v>1)v/=100;S.ivaMaster[sk]=v;}}n++;}
  save();renderMaestro();setTimeout(()=>alert(n+' productos cargados/actualizados en el maestro.'),50);};
 const nm=f.name.toLowerCase();
 if(nm.endsWith('.xlsx')||nm.endsWith('.xls')){if(typeof XLSX==='undefined'){alert('Excel requiere internet la primera vez; probá con CSV.');e.target.value='';return;}const r=new FileReader();r.onload=()=>{try{const wb=XLSX.read(new Uint8Array(r.result),{type:'array'});done(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''}));}catch(x){alert('No pude leer el Excel: '+x.message);}};r.readAsArrayBuffer(f);}
 else{const r=new FileReader();r.onload=()=>done(parseCSV(r.result));r.readAsText(f);}
 e.target.value='';}
